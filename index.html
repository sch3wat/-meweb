<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка 3D Робота</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        .container {
            width: 80%;
            height: 80vh;
            border: 1px solid #333;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        /* Имитация вашего Spotlight */
        .spotlight {
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,255,255,0.1) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="spotlight"></div>
        
        <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.93/build/setup.js"></script>
        
        <spline-viewer url="https://prod.spline.design/kZDDjO5HuC9GJUM2/scene.splinecode"></spline-viewer>
    </div>

</body>
</html>
